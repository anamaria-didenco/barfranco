  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 max-height: 100%; width: auto; height: auto; }\n.mark-stage.wordmark img { max-height: 56px; }\n.mark-card h3 { font-family: \"VTC Marsha\", serif; font-weight: 700; text-transform: uppercase; font-size: 18px; letter-spacing: .06em; color: var(--ink); margin: 0 0 8px; }\n.mark-card p { font-size: 15.5px; color: var(--muted); margin: 0; line-height: 1.55; }\n.mark-card .role { font-style: italic; color: var(--red); font-size: 13px; letter-spacing: .14em; text-transform: uppercase; margin: 0 0 6px; }\n\n/* ---- Logo usage ---- */\n.usage { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin: 40px 0 0; }\n.do, .dont { border: 1px solid var(--line); padding: 0; overflow: hidden; }\n.usage-head { padding: 16px 24px; font-family: \"VTC Marsha\", serif; text-transform: uppercase; letter-spacing: .08em; font-size: 15px; color: #fff; }\n.do .usage-head { background: var(--red); }\n.dont .usage-head { background: var(--ink); }\n.usage ul { list-style: none; margin: 0; padding: 22px 24px 26px; }\n.usage li { position: relative; padding: 0 0 12px 26px; font-size: 16px; }\n.usage li::before { position: absolute; left: 0; top: -1px; font-family: \"VTC Marsha\", serif; }\n.do li::before { content: \"✓\"; color: var(--red); }\n.dont li::before { content: \"✕\"; color: var(--ink); }\n.usage li:last-child { padding-bottom: 0; }\n\n/* ---- Colour ---- */\n.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 44px 0 0; }\n.sw { border: 1px solid var(--line); overflow: hidden; }\n.sw-chip { height: 130px; }\n.sw-body { padding: 16px 18px 20px; }\n.sw-body .nm { font-family: \"VTC Marsha\", serif; text-transform: uppercase; font-size: 14px; letter-spacing: .05em; margin: 0 0 8px; }\n.sw-body .hex { font-style: italic; font-size: 14px; color: var(--muted); margin: 0; }\n.sw-body .use { font-size: 13px; color: var(--muted); margin: 6px 0 0; line-height: 1.45; }\n.ratio-note { margin: 26px 0 0; font-style: italic; font-size: 15px; color: var(--muted); }\n\n/* ---- Type ---- */\n.type-block { margin: 40px 0 0; display: grid; gap: 30px; }\n.spec { border: 1px solid var(--line); background: var(--cream); padding: 34px 36px; }\n.spec .label { font-style: italic; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: var(--red); margin: 0 0 18px; }\n.spec .display { font-family: \"VTC Marsha\", serif; font-weight: 700; text-transform: uppercase; color: var(--ink); font-size: clamp(32px, 5vw, 60px); line-height: .98; letter-spacing: .02em; margin: 0 0 14px; }\n.spec .serif { font-family: \"Affairs\", serif; font-size: 26px; line-height: 1.4; margin: 0 0 10px; color: var(--ink); }\n.spec .serif em { color: var(--red); }\n.spec .meta { font-style: italic; color: var(--muted); font-size: 14.5px; margin: 14px 0 0; }\n.glyphs { font-family: \"VTC Marsha\", serif; color: var(--red); font-size: 22px; letter-spacing: .1em; margin: 16px 0 0; }\n\n/* ---- Voice ---- */\n.voice-grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 48px; align-items: start; margin: 40px 0 0; }\n.says { display: grid; gap: 16px; }\n.says .q { font-family: \"VTC Marsha\", serif; text-transform: uppercase; font-size: clamp(20px, 2.6vw, 30px); line-height: 1.06; letter-spacing: .02em; color: var(--red); margin: 0; padding: 0 0 16px; border-bottom: 1px solid var(--line); }\n.says .q:last-child { border-bottom: none; padding-bottom: 0; }\n.voice-rules { background: var(--ink); color: var(--paper); padding: 34px 34px 30px; }\n.voice-rules h4 { font-family: \"VTC Marsha\", serif; text-transform: uppercase; letter-spacing: .06em; font-size: 15px; margin: 0 0 16px; color: #fff; }\n.voice-rules .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; font-size: 15px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,.14); }\n.voice-rules .row:first-of-type { border-top: none; }\n.voice-rules .yes { color: #fff; }\n.voice-rules .yes::before { content: \"Say \"; font-style: italic; color: rgba(255,255,255,.5); }\n.voice-rules .no { color: rgba(255,255,255,.55); text-decoration: line-through; text-decoration-color: var(--red); }\n\n/* ---- Truth / facts ---- */\n.facts { background: var(--cream); }\n.facts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; margin: 40px 0 0; }\n.fact .k { font-family: \"VTC Marsha\", serif; color: var(--red); text-transform: uppercase; font-size: 13px; letter-spacing: .1em; margin: 0 0 8px; }\n.fact .v { font-size: 16.5px; line-height: 1.5; margin: 0; }\n.fact .v em { color: var(--red); }\n\n/* ---- Footer ---- */\n.foot { background: var(--ink); color: var(--paper); border: none; text-align: center; padding: 70px 0; }\n.foot img { height: 60px; width: auto; filter: brightness(0) invert(1); margin: 0 auto 18px; opacity: .95; }\n.foot p { font-style: italic; color: rgba(255,255,255,.6); font-size: 14px; margin: 0; }\n\n@media (max-width: 860px) {\n  .marks-grid, .swatches, .facts-grid { grid-template-columns: repeat(2, 1fr); }\n  .usage, .voice-grid { grid-template-columns: 1fr; }\n  .wrap { padding: 0 28px; }\n  section { padding: 64px 0; }\n}\n@media (max-width: 520px) {\n  .swatches, .facts-grid { grid-template-columns: 1fr; }\n}\n@media print {\n  section { break-inside: avoid; }\n  body { font-size: 15px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- COVER -->\n<header class=\"cover\">\n  <img class=\"cover-dog\" src=\"05dcfc29-0825-4678-87e9-e4a5f88207d1\" alt=\"\">\n  <div class=\"wrap\">\n    <img class=\"cover-logo\" src=\"f2bef1ad-b6b2-42b0-949b-1f978faba218\" alt=\"Bar Franco\">\n    <h1>The Brand<\u002Fh1>\n    <p class=\"tag\">Italian soul, served without the clichés.<\u002Fp>\n    <p class=\"meta\">Brand Guide · v1 · Christchurch · 2026<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ESSENCE -->\n<section class=\"essence\">\n  <div class=\"wrap\">\n    <span class=\"num\">01 — ESSENCE<\u002Fspan>\n    <h2 class=\"sec\">What Franco is<\u002Fh2>\n    <p class=\"big\">A modern Christchurch bar-restaurant that takes the <em>feeling<\u002Fem> of Italian hospitality — generous, warm, a little theatrical — and strips out the kitsch.<\u002Fp>\n    <p>If Franco were a person: confident but unfussy, warm, quick with a joke, impeccably dressed with the sleeves rolled up. A host, not a maître d'. Serious about the Negroni — never serious about itself.<\u002Fp>\n    <div class=\"adjs\">\n      <span>Spirited<\u002Fspan><span>Generous<\u002Fspan><span>Characterful<\u002Fspan><span>Refined<\u002Fspan><span>Playful<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MARKS -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"num\">02 — THE MARKS<\u002Fspan>\n    <h2 class=\"sec\">Three marks, three jobs<\u002Fh2>\n    <p class=\"lede\">The identity is a trio: the name brings the class, the dog brings the charm, the Negroni brings the ritual. Together they <em>are<\u002Fem> Franco.<\u002Fp>\n    <div class=\"marks-grid\">\n      <div class=\"mark-card\">\n        <div class=\"mark-stage wordmark\"><img src=\"f2bef1ad-b6b2-42b0-949b-1f978faba218\" alt=\"Bar Franco wordmark\"><\u002Fdiv>\n        <p class=\"role\">The name<\u002Fp>\n        <h3>Wordmark<\u002Fh3>\n        <p>The confident, characterful signature. The brand's voice, set down with class. Always the anchor of any layout.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mark-card\">\n        <div class=\"mark-stage\"><img src=\"05dcfc29-0825-4678-87e9-e4a5f88207d1\" alt=\"Bar Franco dachshund\"><\u002Fdiv>\n        <p class=\"role\">The charm<\u002Fp>\n        <h3>The Dachshund<\u002Fh3>\n        <p>The soul of the brand's playfulness — unexpected, cheeky, memorable. The wink that says we don't take ourselves too seriously.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mark-card\">\n        <div class=\"mark-stage\"><img src=\"c2d14d3f-7a9e-42b1-ada1-f48897bdb60d\" alt=\"Bar Franco Negroni glass\"><\u002Fdiv>\n        <p class=\"role\">The ritual<\u002Fp>\n        <h3>The Negroni<\u002Fh3>\n        <p>The icon of the occasion. Hand-drawn, aperitivo-Italian — a reminder that the drink, and the gathering around it, sit at the centre.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LOGO USAGE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"num\">03 — LOGO USAGE<\u002Fspan>\n    <h2 class=\"sec\">Treating the marks well<\u002Fh2>\n    <div class=\"usage\">\n      <div class=\"do\">\n        <div class=\"usage-head\">Do<\u002Fdiv>\n        <ul>\n          <li>Give the wordmark clear space — at least the height of the \"F\" on every side.<\u002Fli>\n          <li>Use red on cream/paper, or white reversed out of red or charcoal.<\u002Fli>\n          <li>Let the dog and Negroni appear as playful accents — in a corner, peeking, walking.<\u002Fli>\n          <li>Keep the marks crisp and at a legible size.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"dont\">\n        <div class=\"usage-head\">Don't<\u002Fdiv>\n        <ul>\n          <li>Recolour the marks outside the palette, add gradients, shadows or outlines.<\u002Fli>\n          <li>Stretch, rotate or squash the wordmark.<\u002Fli>\n          <li>Crowd the logo or place it on a busy photo without a scrim.<\u002Fli>\n          <li>Let the dog or Negroni outshout the wordmark — they support, never lead.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- COLOUR -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"num\">04 — COLOUR<\u002Fspan>\n    <h2 class=\"sec\">The palette<\u002Fh2>\n    <p class=\"lede\">Franco Red does the heavy lifting; charcoal grounds it; cream gives it the calm of a good menu. The red-on-cream pairing is the signature.<\u002Fp>\n    <div class=\"swatches\">\n      <div class=\"sw\">\n        <div class=\"sw-chip\" style=\"background:#BE1622;\"><\u002Fdiv>\n        <div class=\"sw-body\"><p class=\"nm\">Franco Red<\u002Fp><p class=\"hex\">#BE1622<\u002Fp><p class=\"use\">The hero. Headlines, marks, energy.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sw\">\n        <div class=\"sw-chip\" style=\"background:#1D1D1B;\"><\u002Fdiv>\n        <div class=\"sw-body\"><p class=\"nm\">Charcoal<\u002Fp><p class=\"hex\">#1D1D1B<\u002Fp><p class=\"use\">Grounding. Body, footers, contrast.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sw\">\n        <div class=\"sw-chip\" style=\"background:#F4EEE1; border-bottom:1px solid var(--line);\"><\u002Fdiv>\n        <div class=\"sw-body\"><p class=\"nm\">Cream<\u002Fp><p class=\"hex\">#F4EEE1<\u002Fp><p class=\"use\">Warmth. Section grounds, cards.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sw\">\n        <div class=\"sw-chip\" style=\"background:#FCFBF7; border-bottom:1px solid var(--line);\"><\u002Fdiv>\n        <div class=\"sw-body\"><p class=\"nm\">Paper<\u002Fp><p class=\"hex\">#FCFBF7<\u002Fp><p class=\"use\">The canvas. Default background.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"ratio-note\">Rough balance: ~60% paper/cream, ~25% charcoal, ~15% red. Red is a spice, not the whole plate.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TYPE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"num\">05 — TYPOGRAPHY<\u002Fspan>\n    <h2 class=\"sec\">Two voices<\u002Fh2>\n    <p class=\"lede\">Display brings the personality; the serif brings the class. The tension between them is the whole brand.<\u002Fp>\n    <div class=\"type-block\">\n      <div class=\"spec\">\n        <p class=\"label\">Display · VTC Marsha Bold<\u002Fp>\n        <p class=\"display\">Come say ciao<\u002Fp>\n        <p class=\"glyphs\">ABCDEFGHIJKLM · 1234567890<\u002Fp>\n        <p class=\"meta\">Used UPPERCASE for headlines, marks and section titles. The brand's voice, raised. Characterful, slightly retro-Italian.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"spec\">\n        <p class=\"label\">Body · Affairs (Regular &amp; Italic)<\u002Fp>\n        <p class=\"serif\">Delicious Italian food, curated cocktails and seamless hospitality — <em>made for the moments worth gathering for.<\u002Fem><\u002Fp>\n        <p class=\"meta\">Refined, literary, hospitable. The italic carries that handwritten, \"personal note from the host\" feeling — use it for eyebrows, captions and warmth.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VOICE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"num\">06 — VOICE &amp; TONE<\u002Fspan>\n    <h2 class=\"sec\">How Franco talks<\u002Fh2>\n    <p class=\"lede\">Warm, direct, a little witty — never corporate. Franco speaks like a friend who happens to run a great bar.<\u002Fp>\n    <div class=\"voice-grid\">\n      <div class=\"says\">\n        <p class=\"q\">\"Come say ciao.\"<\u002Fp>\n        <p class=\"q\">\"Italian soul, vibrant dining.\"<\u002Fp>\n        <p class=\"q\">\"Made for the moments worth gathering for.\"<\u002Fp>\n        <p class=\"q\">\"Italian in spirit, never by the cliché.\"<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"voice-rules\">\n        <h4>The swaps<\u002Fh4>\n        <div class=\"row\"><span class=\"yes\">Come say ciao<\u002Fspan><span class=\"no\">Contact us<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"yes\">Pull up a stool<\u002Fspan><span class=\"no\">Make a reservation<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"yes\">Till late<\u002Fspan><span class=\"no\">Late closing hours<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"yes\">A very good night<\u002Fspan><span class=\"no\">A premium experience<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"yes\">The long table<\u002Fspan><span class=\"no\">Group dining solutions<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FACTS -->\n<section class=\"facts\">\n  <div class=\"wrap\">\n    <span class=\"num\">07 — THE TRUTH IT SITS ON<\u002Fspan>\n    <h2 class=\"sec\">The facts<\u002Fh2>\n    <div class=\"facts-grid\">\n      <div class=\"fact\"><p class=\"k\">The place<\u002Fp><p class=\"v\">Two levels — a <em>Negroni Bar<\u002Fem> downstairs, an open-kitchen <em>Restaurant<\u002Fem> upstairs.<\u002Fp><\u002Fdiv>\n      <div class=\"fact\"><p class=\"k\">Where<\u002Fp><p class=\"v\">The Crossing, 166 Cashel Street, Christchurch CBD.<\u002Fp><\u002Fdiv>\n      <div class=\"fact\"><p class=\"k\">The food<\u002Fp><p class=\"v\">Fresh pasta, cocktails, aperitivo &amp; private events.<\u002Fp><\u002Fdiv>\n      <div class=\"fact\"><p class=\"k\">Hours<\u002Fp><p class=\"v\">Daily — bar from <em>4pm<\u002Fem>, kitchen from <em>5pm<\u002Fem>, till late.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <img src=\"f2bef1ad-b6b2-42b0-949b-1f978faba218\" alt=\"Bar Franco\">\n    <p>Be the generous, witty Italian host — bold red, elegant type, a wink from the dog. Never stiff, never cheesy.<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
